{% extends "base.html" %}
{% block title %}Nuevo Sorteo{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-3"><i class="bi bi-plus-circle"></i> Nuevo Sorteo</h3>
            <form method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Título del sorteo *</label>
                    <input type="text" class="form-control" id="title" name="title" required
                           placeholder="Ej: Sorteo de Navidad">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Descripción (opcional)</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                              placeholder="Describe el sorteo..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Crear Sorteo
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
