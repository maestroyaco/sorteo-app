{% extends "base.html" %}
{% block title %}Sorteo App - Inicio{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <div class="card p-5">
            <h1 class="display-4 fw-bold mb-3">
                <i class="bi bi-trophy text-warning"></i> Sorteo App
            </h1>
            <p class="lead text-muted mb-4">
                Crea sorteos fácilmente, agrega participantes por correo electrónico 
                y elige un ganador al azar. ¡Simple y rápido!
            </p>
            <div>
                <a href="{{ url_for('login_page') }}" class="btn btn-primary btn-lg px-5">
                    <i class="bi bi-google"></i> Iniciar sesión con Google
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
