services:
  sorteo-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-super-secret-key-cambia-esto}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OAUTHLIB_INSECURE_TRANSPORT=${OAUTHLIB_INSECURE_TRANSPORT:-1}
      - DATABASE_PATH=/data/sorteo.db
    volumes:
      - sorteo_data:/data
    restart: unless-stopped

volumes:
  sorteo_data:
